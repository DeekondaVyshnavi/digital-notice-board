<!DOCTYPE html>
<html>
<head>
    <title>School Notice Board</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f8ff; text-align: center; }
        .notice { background: white; border-left: 5px solid red; margin: 20px; padding: 10px; border-radius: 5px; box-shadow: 2px 2px 5px #ccc; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>📢 Official School Notice Board</h1>
    <div class="notice">
        <h3>March 2, 2026: Half-Day Tomorrow!</h3>
        <p>School will close at 12:00 PM due to teacher meetings.</p>
    </div>
</body>
</html>
